apiVersion: v1
kind: ServiceAccount
metadata:
  name: sales-consumer
  namespace: sales
  annotations:
    # IRSA: this service account assumes the consumer-specific IAM role
    # which has SQS ReceiveMessage/DeleteMessage + DynamoDB PutItem permissions.
    # Scoped separately from the API role (sqs-only) for least privilege.
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/sales-consumer-dynamodb-role
